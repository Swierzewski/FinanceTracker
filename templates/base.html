<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Finance Guard (PLN){% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💳</text></svg>">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- Topbar -->
<header class="topbar">
    <span class="topbar-icon">💳</span>
    <span class="topbar-brand">AI Finance Guard</span>
</header>

<!-- Spinner overlay -->
<div id="spinner-overlay" class="spinner-overlay">
    <div class="spinner"></div>
    <div class="spinner-text">Agent parsing financial entry…</div>
</div>

<div class="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>🧠 AI Data Entry</h2>
        <p class="sidebar-desc">Log expenses, income, investments, or account transfers.</p>

        <form id="ai-entry-form">
            <div class="form-group">
                <label class="form-label" for="nl-input">Message</label>
                <textarea id="nl-input" name="text"
                    placeholder="e.g., 'Transfer 500zł from PKO to Revolut' or 'Got 6000zł salary on PKO'"></textarea>
            </div>
            <button type="submit" class="btn btn-full" style="margin-top:8px;">Process with AI</button>
        </form>

        <div id="ai-alert" class="alert" style="display:none;"></div>

        <div id="undo-section" style="display:none;">
            <hr class="divider">
            <button id="undo-btn" class="btn btn-danger btn-full">⚠️ Undo Last Action</button>
        </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
